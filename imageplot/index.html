// ── PCA helpers ──
function mean(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}
function std(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((a, b) => a + (b - m) ** 2, 0) / arr.length) || 1;
}
function computePCA(matrix) {
  const n = matrix.length;
  const p = matrix[0].length;
  const means = Array.from({
    length: p
  }, (_, j) => mean(matrix.map(r => r[j])));
  const stds = Array.from({
    length: p
  }, (_, j) => std(matrix.map(r => r[j])));
  const Z = matrix.map(row => row.map((v, j) => (v - means[j]) / stds[j]));
  const cov = Array.from({
    length: p
  }, (_, i) => Array.from({
    length: p
  }, (_, j) => Z.reduce((s, row) => s + row[i] * row[j], 0) / (n - 1)));
  const eigenvectors = [];
  let A = cov.map(r => [...r]);
  for (let ev = 0; ev < 2; ev++) {
    let v = Array.from({
      length: p
    }, () => Math.random());
    for (let iter = 0; iter < 200; iter++) {
      const Av = v.map((_, i) => A[i].reduce((s, a, j) => s + a * v[j], 0));
      const norm = Math.sqrt(Av.reduce((s, x) => s + x * x, 0)) || 1;
      v = Av.map(x => x / norm);
    }
    eigenvectors.push(v);
    const lambda = v.reduce((s, vi, i) => s + vi * A[i].reduce((ss, a, j) => ss + a * v[j], 0), 0);
    A = A.map((row, i) => row.map((val, j) => val - lambda * v[i] * v[j]));
  }
  return Z.map(row => eigenvectors.map(ev => ev.reduce((s, e, j) => s + e * row[j], 0)));
}

// ── t-SNE (Barnes-Hut simplified) ──
function computeTSNE(matrix, {
  perplexity = 30,
  iterations = 500,
  learningRate = 100
} = {}) {
  const n = matrix.length;
  const p = matrix[0].length;
  const means = Array.from({
    length: p
  }, (_, j) => mean(matrix.map(r => r[j])));
  const stds = Array.from({
    length: p
  }, (_, j) => std(matrix.map(r => r[j])));
  const X = matrix.map(row => row.map((v, j) => (v - means[j]) / stds[j]));
  const dist2 = (a, b) => a.reduce((s, v, i) => s + (v - b[i]) ** 2, 0);

  // Compute pairwise affinities
  const P = Array.from({
    length: n
  }, () => new Float64Array(n));
  for (let i = 0; i < n; i++) {
    const dists = X.map((xj, j) => i === j ? Infinity : dist2(X[i], xj));
    let lo = 0.01,
      hi = 100,
      sigma = 1;
    for (let iter = 0; iter < 50; iter++) {
      sigma = (lo + hi) / 2;
      const pVals = dists.map(d => d === Infinity ? 0 : Math.exp(-d / (2 * sigma * sigma)));
      const sumP = pVals.reduce((a, b) => a + b, 0) || 1;
      const H = -pVals.reduce((s, p, j) => s + (p > 0 ? p / sumP * Math.log2(p / sumP) : 0), 0);
      if (Math.abs(H - Math.log2(perplexity)) < 0.01) break;
      if (H > Math.log2(perplexity)) hi = sigma;else lo = sigma;
    }
    const pVals = dists.map(d => d === Infinity ? 0 : Math.exp(-d / (2 * sigma * sigma)));
    const sumP = pVals.reduce((a, b) => a + b, 0) || 1;
    for (let j = 0; j < n; j++) P[i][j] = pVals[j] / sumP;
  }
  // Symmetrize
  for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
    const v = (P[i][j] + P[j][i]) / (2 * n);
    P[i][j] = v;
    P[j][i] = v;
  }

  // Initialize Y randomly
  const Y = Array.from({
    length: n
  }, () => [Math.random() * 0.01 - 0.005, Math.random() * 0.01 - 0.005]);
  const gains = Array.from({
    length: n
  }, () => [1, 1]);
  const Ym1 = Y.map(y => [...y]);
  for (let t = 0; t < iterations; t++) {
    const exag = t < 100 ? 4 : 1;
    // Compute Q
    const num = Array.from({
      length: n
    }, () => new Float64Array(n));
    let sumQ = 0;
    for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
      const d = 1 / (1 + (Y[i][0] - Y[j][0]) ** 2 + (Y[i][1] - Y[j][1]) ** 2);
      num[i][j] = d;
      num[j][i] = d;
      sumQ += 2 * d;
    }
    sumQ = sumQ || 1;
    const grad = Array.from({
      length: n
    }, () => [0, 0]);
    for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const mult = 4 * (exag * P[i][j] - num[i][j] / sumQ) * num[i][j];
      grad[i][0] += mult * (Y[i][0] - Y[j][0]);
      grad[i][1] += mult * (Y[i][1] - Y[j][1]);
    }
    const momentum = t < 250 ? 0.5 : 0.8;
    for (let i = 0; i < n; i++) for (let d = 0; d < 2; d++) {
      const signMatch = grad[i][d] > 0 === Y[i][d] - Ym1[i][d] > 0;
      gains[i][d] = signMatch ? gains[i][d] * 0.8 : gains[i][d] + 0.2;
      gains[i][d] = Math.max(gains[i][d], 0.01);
      const prev = Y[i][d];
      Y[i][d] = Y[i][d] + momentum * (Y[i][d] - Ym1[i][d]) - learningRate * gains[i][d] * grad[i][d];
      Ym1[i][d] = prev;
    }
    // Center
    const my0 = mean(Y.map(y => y[0])),
      my1 = mean(Y.map(y => y[1]));
    for (let i = 0; i < n; i++) {
      Y[i][0] -= my0;
      Y[i][1] -= my1;
    }
  }
  return Y;
}

// ── Color utilities ──
function yearToColor(t) {
  // t: 0..1, blue → teal → orange → yellow → red
  if (t <= 0.25) {
    const s = t / 0.25;
    const r = Math.round(20 + s * 0);
    const g = Math.round(50 + s * 160);
    const b = Math.round(190 - s * 30);
    return `rgb(${r},${g},${b})`;
  } else if (t <= 0.5) {
    const s = (t - 0.25) / 0.25;
    const r = Math.round(20 + s * 215);
    const g = Math.round(210 - s * 60);
    const b = Math.round(160 - s * 130);
    return `rgb(${r},${g},${b})`;
  } else if (t <= 0.75) {
    const s = (t - 0.5) / 0.25;
    const r = Math.round(235 + s * 20);
    const g = Math.round(150 + s * 90);
    const b = Math.round(30 - s * 20);
    return `rgb(${r},${g},${b})`;
  } else {
    const s = (t - 0.75) / 0.25;
    const r = Math.round(255 - s * 55);
    const g = Math.round(240 - s * 180);
    const b = Math.round(10 + s * 40);
    return `rgb(${r},${g},${b})`;
  }
}
const DARK_BG = "#111111";
const CANVAS_BG = "#646464";
const PANEL_BG = "#161616";
const BORDER = "#2e2e2e";
const ACCENT = "#e8e8e8";
const TEXT = "#f2f2f2";
const TEXT_DIM = "#b3b3b3";
const TEXT_BRIGHT = "#f0f0f0";

// ── Feature extraction helpers ──
function rgbToHsl(r, g, b) {
  r /= 255;
  g /= 255;
  b /= 255;
  const max = Math.max(r, g, b),
    min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return [0, 0, l];
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;else if (max === g) h = ((b - r) / d + 2) / 6;else h = ((r - g) / d + 4) / 6;
  return [h * 360, s, l];
}
function medianSorted(arr) {
  const n = arr.length;
  if (n === 0) return 0;
  const mid = Math.floor(n / 2);
  return n % 2 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2;
}
function stdDev(arr, meanVal) {
  if (arr.length === 0) return 0;
  const sumSq = arr.reduce((s, v) => s + (v - meanVal) ** 2, 0);
  return Math.sqrt(sumSq / arr.length);
}
function circularMean(angles) {
  let sinSum = 0,
    cosSum = 0;
  for (const a of angles) {
    const rad = a * Math.PI / 180;
    sinSum += Math.sin(rad);
    cosSum += Math.cos(rad);
  }
  let m = Math.atan2(sinSum / angles.length, cosSum / angles.length) * 180 / Math.PI;
  if (m < 0) m += 360;
  return m;
}
function circularStd(angles, meanAngle) {
  let cosSum = 0;
  for (const a of angles) {
    cosSum += Math.cos((a - meanAngle) * Math.PI / 180);
  }
  const R = cosSum / angles.length;
  return Math.sqrt(-2 * Math.log(Math.max(R, 1e-10))) * (180 / Math.PI);
}
function shannonEntropy(values, numBins, minVal, maxVal) {
  const range = maxVal - minVal || 1;
  const bins = new Uint32Array(numBins);
  for (const v of values) {
    const idx = Math.min(numBins - 1, Math.max(0, Math.floor((v - minVal) / range * numBins)));
    bins[idx]++;
  }
  const n = values.length;
  let entropy = 0;
  for (let i = 0; i < numBins; i++) {
    if (bins[i] > 0) {
      const p = bins[i] / n;
      entropy -= p * Math.log2(p);
    }
  }
  return entropy;
}

// Prepare pixel data from an image — shared by basic and all extraction
function preparePixelData(img) {
  const maxDim = 256;
  let cw, ch;
  if (img.naturalWidth <= maxDim && img.naturalHeight <= maxDim) {
    cw = img.naturalWidth;
    ch = img.naturalHeight;
  } else {
    const scale = Math.min(maxDim / img.naturalWidth, maxDim / img.naturalHeight);
    cw = Math.round(img.naturalWidth * scale);
    ch = Math.round(img.naturalHeight * scale);
  }
  const canvas = document.createElement("canvas");
  canvas.width = cw;
  canvas.height = ch;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, cw, ch);
  const imageData = ctx.getImageData(0, 0, cw, ch);
  const px = imageData.data;
  const n = cw * ch;
  const brightness = new Float32Array(n);
  const saturation = new Float32Array(n);
  const hue = new Float32Array(n);
  const red = new Uint8Array(n);
  const green = new Uint8Array(n);
  const blue = new Uint8Array(n);
  for (let i = 0; i < n; i++) {
    const off = i * 4;
    red[i] = px[off];
    green[i] = px[off + 1];
    blue[i] = px[off + 2];
    const [h, s, l] = rgbToHsl(px[off], px[off + 1], px[off + 2]);
    brightness[i] = l;
    saturation[i] = s;
    hue[i] = h;
  }
  return {
    cw,
    ch,
    n,
    brightness,
    saturation,
    hue,
    red,
    green,
    blue
  };
}
function extractBasicFeatures(pd) {
  const {
    brightness,
    saturation,
    hue,
    n
  } = pd;
  const bSorted = Float32Array.from(brightness).sort((a, b) => a - b);
  const sSorted = Float32Array.from(saturation).sort((a, b) => a - b);
  const bMedian = medianSorted(bSorted);
  const sMedian = medianSorted(sSorted);
  const bMean = brightness.reduce((a, b) => a + b, 0) / n;
  const sMean = saturation.reduce((a, b) => a + b, 0) / n;
  const hMean = circularMean(hue);
  return {
    brightness_median: bMedian,
    brightness_stdev: stdDev(brightness, bMean),
    saturation_median: sMedian,
    saturation_stdev: stdDev(saturation, sMean),
    hue_median: hMean,
    hue_stdev: circularStd(hue, hMean)
  };
}
function extractAllFeatures(pd) {
  const {
    cw,
    ch,
    n,
    brightness,
    saturation,
    hue,
    red,
    green,
    blue
  } = pd;
  const basic = extractBasicFeatures(pd);
  const features = {
    ...basic
  };

  // ── Spatial grid 3×3 (27 features) ──
  const cellW = Math.floor(cw / 3);
  const cellH = Math.floor(ch / 3);
  const gridLabels = ["TL", "TC", "TR", "ML", "MC", "MR", "BL", "BC", "BR"];
  for (let gr = 0; gr < 3; gr++) {
    for (let gc = 0; gc < 3; gc++) {
      const label = gridLabels[gr * 3 + gc];
      let bSum = 0,
        sSum = 0,
        hSin = 0,
        hCos = 0,
        count = 0;
      const y0 = gr * cellH,
        y1 = gr === 2 ? ch : (gr + 1) * cellH;
      const x0 = gc * cellW,
        x1 = gc === 2 ? cw : (gc + 1) * cellW;
      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const idx = y * cw + x;
          bSum += brightness[idx];
          sSum += saturation[idx];
          const rad = hue[idx] * Math.PI / 180;
          hSin += Math.sin(rad);
          hCos += Math.cos(rad);
          count++;
        }
      }
      features[`grid_${label}_brightness`] = count > 0 ? bSum / count : 0;
      features[`grid_${label}_saturation`] = count > 0 ? sSum / count : 0;
      let hm = Math.atan2(hSin / count, hCos / count) * 180 / Math.PI;
      if (hm < 0) hm += 360;
      features[`grid_${label}_hue`] = count > 0 ? hm : 0;
    }
  }

  // ── Complexity / entropy (3 features) ──
  features.brightness_entropy = shannonEntropy(brightness, 32, 0, 1);
  features.hue_entropy = shannonEntropy(hue, 36, 0, 360);

  // Edge density via Sobel gradient magnitude
  const gray = brightness; // already 0..1
  let edgePixels = 0;
  const gradMag = new Float32Array(n);
  const gradX = new Float32Array(n);
  const gradY = new Float32Array(n);
  for (let y = 1; y < ch - 1; y++) {
    for (let x = 1; x < cw - 1; x++) {
      const idx = y * cw + x;
      const gx = -gray[(y - 1) * cw + (x - 1)] - 2 * gray[y * cw + (x - 1)] - gray[(y + 1) * cw + (x - 1)] + gray[(y - 1) * cw + (x + 1)] + 2 * gray[y * cw + (x + 1)] + gray[(y + 1) * cw + (x + 1)];
      const gy = -gray[(y - 1) * cw + (x - 1)] - 2 * gray[(y - 1) * cw + x] - gray[(y - 1) * cw + (x + 1)] + gray[(y + 1) * cw + (x - 1)] + 2 * gray[(y + 1) * cw + x] + gray[(y + 1) * cw + (x + 1)];
      const mag = Math.sqrt(gx * gx + gy * gy);
      gradMag[idx] = mag;
      gradX[idx] = gx;
      gradY[idx] = gy;
      if (mag > 0.15) edgePixels++;
    }
  }
  const interiorPixels = Math.max(1, (cw - 2) * (ch - 2));
  features.edge_density = edgePixels / interiorPixels;

  // ── Line orientation (4 features) ──
  let horizCount = 0,
    vertCount = 0,
    diagCount = 0,
    totalEdge = 0;
  const angleBins = new Float32Array(180);
  for (let y = 1; y < ch - 1; y++) {
    for (let x = 1; x < cw - 1; x++) {
      const idx = y * cw + x;
      if (gradMag[idx] <= 0.15) continue;
      totalEdge++;
      const gx = gradX[idx];
      const gy = gradY[idx];
      const angle = Math.atan2(Math.abs(gy), Math.abs(gx)) * 180 / Math.PI; // 0..90
      let fullAngle = Math.atan2(gy, gx) * 180 / Math.PI;
      if (fullAngle < 0) fullAngle += 180;
      const bin = Math.min(179, Math.floor(fullAngle));
      angleBins[bin]++;
      if (angle < 20) horizCount++;else if (angle > 70) vertCount++;else diagCount++;
    }
  }
  const te = Math.max(1, totalEdge);
  features.pct_horizontal = horizCount / te;
  features.pct_vertical = vertCount / te;
  features.pct_diagonal = diagCount / te;
  let maxBin = 0,
    maxBinIdx = 0;
  for (let i = 0; i < 180; i++) {
    if (angleBins[i] > maxBin) {
      maxBin = angleBins[i];
      maxBinIdx = i;
    }
  }
  features.dominant_angle = maxBinIdx;

  // ── 16-bin grayscale histogram (16 features) ──
  const grayHist = new Uint32Array(16);
  for (let i = 0; i < n; i++) grayHist[Math.min(15, Math.floor(brightness[i] * 16))]++;
  for (let b = 0; b < 16; b++) features[`gray_hist_${String(b).padStart(2, "0")}`] = grayHist[b] / n;

  // ── 16-bin saturation histogram (16 features) ──
  const satHist = new Uint32Array(16);
  for (let i = 0; i < n; i++) satHist[Math.min(15, Math.floor(saturation[i] * 16))]++;
  for (let b = 0; b < 16; b++) features[`sat_hist_${String(b).padStart(2, "0")}`] = satHist[b] / n;

  // ── Local contrast (1 feature) — mean absolute difference between adjacent pixels ──
  let lcSum = 0;
  for (let y = 0; y < ch - 1; y++) {
    for (let x = 0; x < cw - 1; x++) {
      const idx = y * cw + x;
      lcSum += Math.abs(brightness[idx] - brightness[idx + 1]);
      lcSum += Math.abs(brightness[idx] - brightness[idx + cw]);

  features.local_contrast = lcSum / (2 * (cw - 1) * (ch - 1));

  // ── Aspect ratio (1 feature) ──
  features.aspect_ratio = cw / Math.max(1, ch);

  // ── RGB channel means (3 features) ──
  let rChanSum = 0, gChanSum = 0, bChanSum = 0;
  for (let i = 0; i < n; i++) { rChanSum += red[i]; gChanSum += green[i]; bChanSum += blue[i]; }
  features.red_mean = rChanSum / n / 255;
  features.green_mean = gChanSum / n / 255;
  features.blue_mean = bChanSum / n / 255;

  return features;
}
const BASIC_FEATURE_NAMES = ["brightness_median", "brightness_stdev", "saturation_median", "saturation_stdev", "hue_median", "hue_stdev"];
const ALL_FEATURE_NAMES = [...BASIC_FEATURE_NAMES, "grid_TL_brightness", "grid_TL_saturation", "grid_TL_hue", "grid_TC_brightness", "grid_TC_saturation", "grid_TC_hue", "grid_TR_brightness", "grid_TR_saturation", "grid_TR_hue", "grid_ML_brightness", "grid_ML_saturation", "grid_ML_hue", "grid_MC_brightness", "grid_MC_saturation", "grid_MC_hue", "grid_MR_brightness", "grid_MR_saturation", "grid_MR_hue", "grid_BL_brightness", "grid_BL_saturation", "grid_BL_hue", "grid_BC_brightness", "grid_BC_saturation", "grid_BC_hue", "grid_BR_brightness", "grid_BR_saturation", "grid_BR_hue", "brightness_entropy", "hue_entropy", "edge_density", "pct_horizontal", "pct_vertical", "pct_diagonal", "dominant_angle", "gray_hist_00", "gray_hist_01", "gray_hist_02", "gray_hist_03", "gray_hist_04", "gray_hist_05", "gray_hist_06", "gray_hist_07", "gray_hist_08", "gray_hist_09", "gray_hist_10", "gray_hist_11", "gray_hist_12", "gray_hist_13", "gray_hist_14", "gray_hist_15", "sat_hist_00", "sat_hist_01", "sat_hist_02", "sat_hist_03", "sat_hist_04", "sat_hist_05", "sat_hist_06", "sat_hist_07", "sat_hist_08", "sat_hist_09", "sat_hist_10", "sat_hist_11", "sat_hist_12", "sat_hist_13", "sat_hist_14", "sat_hist_15", "local_contrast", "aspect_ratio", "red_mean", "green_mean", "blue_mean"];

// ── Pair analysis: silhouette score + correlation ──
function pearsonCorrelation(xs, ys) {
  const n = xs.length;
  let sx = 0,
    sy = 0,
    sxx = 0,
    syy = 0,
    sxy = 0;
  for (let i = 0; i < n; i++) {
    sx += xs[i];
    sy += ys[i];
    sxx += xs[i] * xs[i];
    syy += ys[i] * ys[i];
    sxy += xs[i] * ys[i];
  }
  const denom = Math.sqrt((n * sxx - sx * sx) * (n * syy - sy * sy));
  return denom === 0 ? 0 : (n * sxy - sx * sy) / denom;
}
function kmeansCluster(points, k, maxIter = 15) {
  const n = points.length;

  const centroids = [];
  for (let i = 0; i < k; i++) {
    const idx = Math.floor(i * n / k);
    centroids.push([points[idx][0], points[idx][1]]);
  }
  const assignments = new Uint8Array(n);
  for (let iter = 0; iter < maxIter; iter++) {
    // Assign
    for (let i = 0; i < n; i++) {

        bestK = 0;
      for (let ki = 0; ki < k; ki++) {
        const dx = points[i][0] - centroids[ki][0];
        const dy = points[i][1] - centroids[ki][1];
